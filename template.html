    @keyframes topFlow{0%{background-position:0% center}100%{background-position:200% center}}
    .promo-card::after { content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(245,158,11,.08),transparent 70%);pointer-events:none; }
    .promo-lbl { font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#f59e0b;margin-bottom:8px; }
    .promo-ttl { font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-.01em; }
    .promo-desc { font-size:13.5px;color:rgba(215,205,235,.65);margin-bottom:16px;line-height:1.5; }
    .promo-facts { display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px; }
    .promo-fact { padding:5px 11px;border-radius:100px;font-size:12px;font-weight:500;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fcd34d; }
    .promo-btn { display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:600;text-decoration:none;color:#0d0120;background:linear-gradient(135deg,#fcd34d,#f59e0b,#d97706);box-shadow:0 0 24px rgba(245,158,11,.5),0 0 48px rgba(245,158,11,.15);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;animation:goldGlow 3s ease-in-out infinite; }
    @keyframes goldGlow{0%,100%{box-shadow:0 0 24px rgba(245,158,11,.5)}50%{box-shadow:0 0 40px rgba(245,158,11,.75)}}
    .promo-btn::before { content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:skewX(-20deg);animation:shimmerSweep 3s ease-in-out 1.5s infinite; }
    .promo-btn:active { transform:scale(.97); }
    @media(hover:hover){.promo-btn:hover{transform:translateY(-2px);box-shadow:0 0 44px rgba(245,158,11,.75)}}
    .promo-btn svg { width:18px;height:18px;fill:currentColor; }

    .footer { font-size:11.5px;color:rgba(160,145,190,.4);text-align:center;padding:6px 0 4px;letter-spacing:.04em; }
    .footer a { color:rgba(168,85,247,.45);text-decoration:none; }

    @media(max-width:375px) {
      .page{padding:20px 12px 44px;gap:12px}
      .avatar{width:92px;height:92px}
      .social-grid{gap:7px}
      .s-icon{width:34px;height:34px;border-radius:9px}
      .s-icon svg{width:17px;height:17px}
      .sbtn{padding:11px 3px;border-radius:13px}
      .s-name{font-size:9px}
    }
    @media(min-width:460px){.page{padding:42px 20px 60px}}
  </style>
</head>

/* ═══════════════════════════════════════
   РЕНДЕР
═══════════════════════════════════════ */
function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('');
}

function renderSocialGrid(links) {
  const defs = [
    { key:'telegram',        cls:'tg',   ico:'tg',   label:'Telegram',  icoCls:'i-tg'   },
    { key:'telegramChannel', cls:'tgch', ico:'ch',   label:'Канал',     icoCls:'i-tgch' },
    { key:'whatsapp',        cls:'wa',   ico:'wa',   label:'WhatsApp',  icoCls:'i-wa'   },
    { key:'instagram',       cls:'ig',   ico:'ig',   label:'Instagram', icoCls:'i-ig'   },
    { key:'vk',              cls:'vk',   ico:'vk',   label:'ВКонтакте', icoCls:'i-vk'   },
    { key:'youtube',         cls:'yt',   ico:'yt',   label:'YouTube',   icoCls:'i-yt'   },
    { key:'facebook',        cls:'fb',   ico:'fb',   label:'Facebook',  icoCls:'i-fb'   },
    { key:'max',             cls:'mx',   ico:'mx',   label:'MAX',       icoCls:'i-mx'   },
    { key:'website',         cls:'web',  ico:'web',  label:'Сайт',      icoCls:'i-web'  },
    { key:'email',           cls:'em',   ico:'em',   label:'Email',     icoCls:'i-em'   },
  ];
  const active = defs.filter(d => links[d.key]);
  return active.map(d => `
    <a class="sbtn ${d.cls}" href="${links[d.key]}" ${d.key!=='email'?'target="_blank" rel="noopener"':''}>
      <div class="s-icon ${d.icoCls}">${ICONS[d.ico]}</div>
      <span class="s-name">${d.label}</span>
    </a>`).join('');
}

function renderContactRows(links) {
  const rows = [
    { key:'telegram',  label:'Telegram (личный)',  val:'@'+links.telegram?.split('/').pop(), ico:ICONS.tg,  bg:'linear-gradient(135deg,#0088cc,#29b6f6)', shadow:'rgba(0,136,204,.45)' },
    { key:'max',       label:'MAX (личный)',        val:'max.ru',                             ico:ICONS.mx,  bg:'linear-gradient(135deg,#0a3eb0,#4d8bff)', shadow:'rgba(77,139,255,.45)' },
    { key:'whatsapp',  label:'WhatsApp',            val:'+'+links.whatsapp?.split('me/')[1],  ico:ICONS.wa,  bg:'linear-gradient(135deg,#128c3e,#25d366)', shadow:'rgba(37,211,102,.4)' },
    { key:'website',   label:'Сайт',               val:links.website?.replace(/https?:\/\//,''), ico:ICONS.web, bg:'linear-gradient(135deg,#0e7490,#06b6d4)', shadow:'rgba(6,182,212,.4)' },
    { key:'email',     label:'Email',               val:links.email,                          ico:ICONS.em,  bg:'linear-gradient(135deg,#c2410c,#fb923c)', shadow:'rgba(234,88,12,.4)' },
  ];
  return rows.filter(r => links[r.key]).map(r => `
    <a class="crow" href="${r.key==='email'?'mailto:':r.key==='website'?'':r.key==='whatsapp'?links.whatsapp:r.key==='max'?links.max:links[r.key]}" ${r.key!=='email'?'target="_blank" rel="noopener"':''}>
      <div class="c-ico" style="background:${r.bg};box-shadow:0 3px 12px ${r.shadow};">${r.ico}</div>
      <div><p class="c-lbl">${r.label}</p><p class="c-val">${r.val||''}</p></div>
      <span class="c-arr">${ICONS.arr}</span>
    </a>`).join('');
}

function render(C) {
  const L = C.links;
  const hasTg  = !!L.telegram;
  const hasMax = !!L.max;
  const hasWa  = !!L.whatsapp;

  document.getElementById('page-title').textContent = C.name + ' — Психолог';
  document.getElementById('page-desc').content      = C.name + '. ' + (C.degree||'');

  const photoHtml = C.photo
    ? `<img src="${C.photo}" alt="${C.name}" onerror="this.style.display='none'">`
    : initials(C.name);

  const chipsHtml = C.chips.map(ch => {
    const cls = ch.style ? `chip chip-${ch.style}` : 'chip';
    return `<span class="${cls}">${ch.text}</span>`;
  }).join('');

  const ctaBtns = [
    hasTg  && `<a class="btn-tg"  href="${L.telegram}" target="_blank" rel="noopener">${ICONS.tg} Написать в Telegram</a>`,
    hasMax && `<a class="btn-max" href="${L.max}"      target="_blank" rel="noopener">${ICONS.mx} Написать в MAX</a>`,
    hasWa  && `<a class="btn-wa"  href="${L.whatsapp}" target="_blank" rel="noopener">${ICONS.wa} Написать в WhatsApp</a>`,
  ].filter(Boolean).join('');

  const statsHtml = C.stats.slice(0,3).map(s =>
    `<div class="stat"><span class="stat-n">${s.num}</span><span class="stat-l">${s.label}</span></div>`
  ).join('');

  const svcsHtml = C.services.map((s, i) =>
    `<div class="svc">
      <div class="s-dot" style="background:${s.color};box-shadow:0 0 8px ${s.color}88;animation-delay:${i*0.5}s"></div>
      <div><p class="s-txt">${s.name}</p><p class="s-sub">${s.desc}</p></div>
    </div>`
  ).join('');

  const promoHtml = C.promo ? `
    <div class="card promo-card">
      <p class="promo-lbl">${C.promo.emoji} ${C.promo.label}</p>
      <h2 class="promo-ttl">${C.promo.title}</h2>
      <p class="promo-desc">${C.promo.desc}</p>
      <div class="promo-facts">${C.promo.facts.map(f=>`<span class="promo-fact">${f}</span>`).join('')}</div>
      <a class="promo-btn" href="${C.promo.url}" target="_blank" rel="noopener">${ICONS.play} ${C.promo.btn}</a>
    </div>` : '';

  const websiteLabel = L.website ? L.website.replace(/https?:\/\//,'') : '';

  document.getElementById('app').innerHTML = `
    <!-- HERO -->
    <div class="card card-glow hero-card">
      <div class="avatar-wrap">
        <div class="avatar-ring-outer"></div>
        <div class="avatar-ring"></div>
        <div class="avatar">${photoHtml}</div>
        <div class="avatar-online"></div>
      </div>
      <h1 class="name">${C.name}</h1>
      ${C.degree ? `<p class="degree">${C.degree}</p>` : ''}
      <div class="chips">${chipsHtml}</div>
      <p class="bio">${C.bio}</p>
    </div>

    <!-- CTA КНОПКИ -->
    <div class="card cta-card" style="overflow:visible;">
      <div class="pulse-ring"></div>
      <div class="cta-buttons">${ctaBtns}</div>
    </div>

    <!-- СОЦСЕТИ -->
    <div class="card social-card">
      <p class="social-title">Социальные сети</p>
      <div class="social-grid">${renderSocialGrid(L)}</div>
    </div>

    <!-- О МНЕ -->
    <div class="card about-card">
      <p class="sec-ttl ttl-gold">Обо мне</p>
      <div class="about-text"><p>${C.about}</p></div>
      <div class="stats-row">${statsHtml}</div>
    </div>

    <!-- УСЛУГИ -->
    <div class="card services-card">
      <p class="sec-ttl ttl-purple">Направления работы</p>
      <div class="service-list">${svcsHtml}</div>
    </div>

    <!-- КОНТАКТЫ -->
    <div class="card contacts-card">${renderContactRows(L)}</div>

    <!-- ПРОМО -->
    ${promoHtml}

    ${websiteLabel ? `<div class="footer"><a href="${L.website}" target="_blank" rel="noopener">${websiteLabel}</a></div>` : ''}
  `;
}

render(CONFIG);

/* ═══════════════════════════════════════
   CANVAS — ЗВЁЗДЫ + ЧАСТИЦЫ + МЕТЕОРИТЫ
═══════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], shooters = [], particles = [], raf;
  const SC = 200, PC = 18;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function rand(a, b) { return a + Math.random() * (b - a); }

  function initStars() {
    stars = [];
    for (let i = 0; i < SC; i++) {
      const t = Math.random();
      stars.push({ x:Math.random()*W, y:Math.random()*H, r:rand(.25,1.6), spd:rand(.05,.3), tw:Math.random()*Math.PI*2, ts:rand(.006,.022),
        col: t<.3?[240,200,255]:t<.55?[200,180,255]:t<.75?[255,220,130]:[255,255,255] });
    }
  }
  function initParticles() {
    particles = [];
    const cols = [[139,92,246],[236,72,153],[20,184,166],[245,158,11]];
    for (let i = 0; i < PC; i++) {
      const c = cols[Math.floor(Math.random()*cols.length)];
      particles.push({ x:Math.random()*W, y:Math.random()*H, vx:rand(-.18,.18), vy:rand(-.25,-.05),
        r:rand(1.5,4.5), color:c, alpha:rand(.15,.55), life:Math.random(), ls:rand(.002,.006) });
    }
  }
  function spawnShooter() {
    shooters.push({ x:rand(0,W*.75), y:rand(0,H*.45), len:rand(90,220), spd:rand(7,16), angle:Math.PI/5+rand(-.15,.25), life:1, decay:rand(.018,.032) });
    setTimeout(spawnShooter, rand(2800,7500));
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,W*.6,H);
    g.addColorStop(0,'#0d0120');g.addColorStop(.4,'#120230');g.addColorStop(.75,'#0c1535');g.addColorStop(1,'#080d1e');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    for (const s of stars) {
      s.tw+=s.ts; const a=.3+.7*((Math.sin(s.tw)+1)/2);
      s.y+=s.spd*.25; s.x+=Math.sin(s.tw*.35)*.06;
      if(s.y>H+2){s.y=-2;s.x=Math.random()*W} if(s.x>W+2)s.x=0; if(s.x<-2)s.x=W;
      const [r,g2,b]=s.col, grd=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
      grd.addColorStop(0,`rgba(${r},${g2},${b},${a})`); grd.addColorStop(1,`rgba(${r},${g2},${b},0)`);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(${r},${g2},${b},${Math.min(1,a+.3)})`; ctx.fill();
    }
    for (const p of particles) {
      p.x+=p.vx; p.y+=p.vy; p.life+=p.ls; const a=p.alpha*Math.abs(Math.sin(p.life));
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W} if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
      const [r,g2,b]=p.color, pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
      pg.addColorStop(0,`rgba(${r},${g2},${b},${a})`); pg.addColorStop(1,`rgba(${r},${g2},${b},0)`);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
    }
    for (let i=shooters.length-1; i>=0; i--) {
      const s=shooters[i]; s.x+=Math.cos(s.angle)*s.spd; s.y+=Math.sin(s.angle)*s.spd; s.life-=s.decay;
      if(s.life<=0){shooters.splice(i,1);continue;}
      const tx=s.x-Math.cos(s.angle)*s.len, ty=s.y-Math.sin(s.angle)*s.len;
      const tail=ctx.createLinearGradient(s.x,s.y,tx,ty);
      tail.addColorStop(0,`rgba(255,235,140,${s.life*.95})`); tail.addColorStop(.3,`rgba(200,160,255,${s.life*.5})`); tail.addColorStop(1,'rgba(255,235,140,0)');
      ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(tx,ty); ctx.strokeStyle=tail; ctx.lineWidth=1.8; ctx.lineCap='round'; ctx.stroke();
      ctx.beginPath(); ctx.arc(s.x,s.y,2,0,Math.PI*2); ctx.fillStyle=`rgba(255,245,200,${s.life})`; ctx.fill();
    }
    raf = requestAnimationFrame(draw);
  }
  resize(); initStars(); initParticles(); spawnShooter(); draw();
  window.addEventListener('resize', () => { cancelAnimationFrame(raf); resize(); initStars(); initParticles(); draw(); });
})();
</script>
