<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ph.Dr. Olga Tureva</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #07001a;
    color: #f1e8d0;
    font-family: "Palatino Linotype", "Book Antiqua", "Palatino", "Georgia", serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Stars canvas */
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Nebula glow layers */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 70vw; height: 60vh;
    top: -10%; left: -15%;
    background: radial-gradient(ellipse, rgba(120,40,200,0.18) 0%, transparent 70%);
    filter: blur(40px);
  }
  body::after {
    width: 60vw; height: 60vh;
    bottom: -10%; right: -10%;
    background: radial-gradient(ellipse, rgba(80,20,160,0.2) 0%, transparent 70%);
    filter: blur(50px);
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(15, 5, 40, 0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(200,160,80,0.18);
    border-radius: 28px;
    padding: 52px 48px 44px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow:
      0 0 60px rgba(120,40,220,0.2),
      0 0 120px rgba(80,20,160,0.15),
      0 32px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,220,100,0.08);
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Avatar */
  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a1a8a, #7b2fff, #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #f5e6c0;
    position: relative;
    box-shadow: 0 0 0 2px rgba(200,160,60,0.35), 0 0 40px rgba(120,40,220,0.5);
    overflow: hidden;
  }
  .avatar img {
    width: 130%;
    height: 130%;
    object-fit: cover;
    object-position: center 18%;
    border-radius: 50%;
    margin-top: -10%;
  }
  .avatar::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #c8a020, #f0d060, #c8a020, #f0d060, #c8a020);
    z-index: -1;
    opacity: 0.6;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Name */
  h1 {
    font-size: clamp(22px, 5.5vw, 34px);
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.15;
    background: linear-gradient(135deg, #c8922a 0%, #f5d060 30%, #ffe88a 55%, #f5d060 75%, #b8820a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% auto;
    filter: drop-shadow(0 0 18px rgba(240,190,50,0.45));
    animation: goldShimmer 4s linear infinite;
    margin-bottom: 14px;
    white-space: nowrap;
  }
  @keyframes goldShimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .subtitle1 {
    font-size: clamp(15px, 3.5vw, 19px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.08em;
    color: #e2c97e;
    margin-bottom: 6px;
    text-shadow: 0 0 16px rgba(220,180,60,0.35);
  }

  .subtitle2 {
    font-size: clamp(13px, 3vw, 15px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(210,175,100,0.65);
    margin-bottom: 36px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,160,60,0.4), transparent);
    margin: 0 auto 32px;
    width: 75%;
    position: relative;
  }
  .divider::before {
    content: '✦';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: rgba(220,180,60,0.5);
    font-size: 12px;
    background: rgba(15,5,40,0.9);
    padding: 0 8px;
  }

  /* Socials */
  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 16px;
    text-decoration: none;
    transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    position: relative;
    overflow: visible;
  }
  .social-link svg { width: 24px; height: 24px; fill: currentColor; position: relative; z-index: 1; transition: transform 0.18s ease; }

  /* Default coloured state (always visible) */
  .social-link.tg  { background: linear-gradient(135deg, #0d7fc4, #38bdf8); color: #fff; border: 1.5px solid rgba(56,189,248,0.5);  box-shadow: 0 4px 16px rgba(56,189,248,0.35),  inset 0 1px 0 rgba(255,255,255,0.2); }
  .social-link.wa  { background: linear-gradient(135deg, #128c3e, #4ade80); color: #fff; border: 1.5px solid rgba(74,222,128,0.5);  box-shadow: 0 4px 16px rgba(74,222,128,0.35),  inset 0 1px 0 rgba(255,255,255,0.2); }
  .social-link.web { background: linear-gradient(135deg, #6b21d4, #c084fc); color: #fff; border: 1.5px solid rgba(192,132,252,0.5); box-shadow: 0 4px 16px rgba(192,132,252,0.35), inset 0 1px 0 rgba(255,255,255,0.2); }
  .social-link.em  { background: linear-gradient(135deg, #c2410c, #fb923c); color: #fff; border: 1.5px solid rgba(251,146,60,0.5);  box-shadow: 0 4px 16px rgba(251,146,60,0.35),  inset 0 1px 0 rgba(255,255,255,0.2); }

  /* Hover */
  .social-link.tg:hover  { transform: translateY(-6px) scale(1.12); box-shadow: 0 12px 36px rgba(56,189,248,0.6),  0 0 20px rgba(56,189,248,0.4);  filter: brightness(1.15); }
  .social-link.wa:hover  { transform: translateY(-6px) scale(1.12); box-shadow: 0 12px 36px rgba(74,222,128,0.6),  0 0 20px rgba(74,222,128,0.4);  filter: brightness(1.15); }
  .social-link.web:hover { transform: translateY(-6px) scale(1.12); box-shadow: 0 12px 36px rgba(192,132,252,0.6), 0 0 20px rgba(192,132,252,0.4); filter: brightness(1.15); }
  .social-link.em:hover  { transform: translateY(-6px) scale(1.12); box-shadow: 0 12px 36px rgba(251,146,60,0.6),  0 0 20px rgba(251,146,60,0.4);  filter: brightness(1.15); }
  .social-link:hover svg { transform: scale(1.15) rotate(-6deg); }

  /* Active / pressed */
  .social-link.tg:active  { transform: scale(0.92); box-shadow: 0 2px 10px rgba(56,189,248,0.5),  0 0 30px rgba(56,189,248,0.6);  filter: brightness(1.3); }
  .social-link.wa:active  { transform: scale(0.92); box-shadow: 0 2px 10px rgba(74,222,128,0.5),  0 0 30px rgba(74,222,128,0.6);  filter: brightness(1.3); }
  .social-link.web:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(192,132,252,0.5), 0 0 30px rgba(192,132,252,0.6); filter: brightness(1.3); }
  .social-link.em:active  { transform: scale(0.92); box-shadow: 0 2px 10px rgba(251,146,60,0.5),  0 0 30px rgba(251,146,60,0.6);  filter: brightness(1.3); }

  /* CTA */
  .cta {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #1a0a00;
    text-decoration: none;
    background: linear-gradient(135deg, #c8922a, #f5d060, #e8b830);
    border: none;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 28px rgba(200,160,40,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cta:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 40px rgba(200,160,40,0.55); }
  .cta:hover::before { opacity: 1; }
  .cta:active { transform: scale(0.98); }
  .cta svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

  .pulse-ring {
    position: absolute;
    inset: -4px;
    border-radius: 18px;
    border: 2px solid rgba(240,200,60,0.6);
    opacity: 0;
    animation: pulse-ring 2.8s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0;   transform: scale(1.15); }
  }

  .contact-info {
    margin-top: 22px;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: rgba(200,160,60,0.4);
    line-height: 1.9;
  }
  .contact-info a {
    color: rgba(200,160,60,0.4);
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-info a:hover { color: rgba(240,190,60,0.8); }

  @media (max-width: 520px) {
    body { padding: 16px; align-items: flex-start; padding-top: 40px; }
    .card { padding: 36px 20px 30px; border-radius: 22px; }
    h1 { white-space: normal; font-size: clamp(20px, 7vw, 28px); }
    .avatar { width: 76px; height: 76px; font-size: 26px; margin-bottom: 22px; }
    .subtitle1 { font-size: 16px; }
    .subtitle2 { font-size: 12px; margin-bottom: 28px; }
    .socials { gap: 10px; margin-bottom: 26px; }
    .social-link { width: 50px; height: 50px; border-radius: 14px; }
    .social-link svg { width: 22px; height: 22px; }
    .cta { padding: 13px 28px; font-size: 14px; }
    .contact-info { font-size: 11px; }
  }

  @media (max-width: 360px) {
    .socials { gap: 8px; }
    .social-link { width: 46px; height: 46px; }
    h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let W, H, stars = [];
  const STAR_COUNT = 220;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: randBetween(0.3, 1.8),
        speed: randBetween(0.08, 0.55),
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: randBetween(0.005, 0.025),
        // golden / white / purple tint
        hue: Math.random() < 0.3 ? `rgba(240,210,100,` : Math.random() < 0.5 ? `rgba(200,180,255,` : `rgba(255,255,255,`,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    for (const s of stars) {
      s.twinkle += s.twinkleSpeed;
      const alpha = 0.35 + 0.65 * ((Math.sin(s.twinkle) + 1) / 2);

      // Move downward (subtle drift)
      s.y += s.speed * 0.3;
      s.x += Math.sin(s.twinkle * 0.4) * 0.08;

      if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
      if (s.x > W + 2) s.x = 0;
      if (s.x < -2)    s.x = W;

      // Glow
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3.5);
      grad.addColorStop(0, s.hue + alpha + ')');
      grad.addColorStop(1, s.hue + '0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.hue + Math.min(1, alpha + 0.3) + ')';
      ctx.fill();
    }

    // Shooting stars
    requestAnimationFrame(draw);
  }

  // Occasional shooting star
  let shooters = [];
  function spawnShooter() {
    shooters.push({
      x: Math.random() * W * 0.7,
      y: Math.random() * H * 0.4,
      len: randBetween(80, 200),
      speed: randBetween(6, 14),
      angle: Math.PI / 5 + Math.random() * 0.3,
      alpha: 1,
      life: 1,
    });
    setTimeout(spawnShooter, randBetween(2500, 7000));
  }

  const origDraw = draw;
  function drawFull() {
    ctx.clearRect(0, 0, W, H);

    for (const s of stars) {
      s.twinkle += s.twinkleSpeed;
      const alpha = 0.35 + 0.65 * ((Math.sin(s.twinkle) + 1) / 2);
      s.y += s.speed * 0.3;
      s.x += Math.sin(s.twinkle * 0.4) * 0.08;
      if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
      if (s.x > W + 2) s.x = 0;
      if (s.x < -2)    s.x = W;

      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3.5);
      grad.addColorStop(0, s.hue + alpha + ')');
      grad.addColorStop(1, s.hue + '0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.hue + Math.min(1, alpha + 0.3) + ')';
      ctx.fill();
    }

    // Draw shooting stars
    for (let i = shooters.length - 1; i >= 0; i--) {
      const sh = shooters[i];
      sh.x += Math.cos(sh.angle) * sh.speed;
      sh.y += Math.sin(sh.angle) * sh.speed;
      sh.life -= 0.022;
      if (sh.life <= 0) { shooters.splice(i, 1); continue; }

      const tail = ctx.createLinearGradient(
        sh.x, sh.y,
        sh.x - Math.cos(sh.angle) * sh.len,
        sh.y - Math.sin(sh.angle) * sh.len
      );
      tail.addColorStop(0, `rgba(255,230,120,${sh.life * 0.9})`);
      tail.addColorStop(1, 'rgba(255,230,120,0)');
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh.x - Math.cos(sh.angle) * sh.len, sh.y - Math.sin(sh.angle) * sh.len);
      ctx.strokeStyle = tail;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    requestAnimationFrame(drawFull);
  }

  resize();
  initStars();
  spawnShooter();
  drawFull();

  window.addEventListener('resize', () => { resize(); initStars(); });
</script>
